name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x86_64
          - os: ubuntu-24.04-arm
            name: linux-aarch64
          - os: macos-latest
            name: macos-aarch64
          - os: ubuntu-latest
            name: linux-x86_64-musl
            alpine: x86_64
            apk_sha: 34bb1a96f0258982377a289392d4ea9f3f4b767a4bb5806b1b87179b79ad8a1c
          - os: ubuntu-24.04-arm
            name: linux-aarch64-musl
            alpine: aarch64
            apk_sha: e471d35aa221d031abe9b6288aede12a8e9f1a398954e5a2e1d1bce1727b4ef4
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: mlugg/setup-zig@v2
        if: ${{ !matrix.alpine }}
        with:
          version: 0.15.1

      - name: install system libs (ubuntu glibc)
        if: runner.os == 'Linux' && !matrix.alpine
        run: sudo apt-get update && sudo apt-get install -y libpcre2-dev libsqlite3-dev zlib1g-dev libmysqlclient-dev libpq-dev libssl-dev libnghttp2-dev libcurl4-openssl-dev

      - name: install system libs (macos)
        if: runner.os == 'macOS'
        run: brew install mysql-client libpq openssl@3 nghttp2 curl

      - name: setup alpine (musl)
        if: matrix.alpine
        uses: jirutka/setup-alpine@v1
        with:
          arch: ${{ matrix.alpine }}
          branch: latest-stable
          apk-tools-url: https://gitlab.alpinelinux.org/api/v4/projects/5/packages/generic/v2.14.10/${{ matrix.alpine }}/apk.static#!sha256!${{ matrix.apk_sha }}
          packages: >
            build-base linux-headers curl xz
            pcre2-dev sqlite-dev sqlite-static zlib-dev zlib-static
            mariadb-connector-c-dev libpq-dev
            openssl-dev openssl-libs-static
            nghttp2-dev nghttp2-static curl-dev curl-static

      - name: install zig (alpine)
        if: matrix.alpine
        shell: alpine.sh --root {0}
        run: |
          cd /tmp
          curl -sSL https://ziglang.org/download/0.15.1/zig-${{ matrix.alpine }}-linux-0.15.1.tar.xz | tar -xJ
          mv zig-${{ matrix.alpine }}-linux-0.15.1 /opt/zig
          ln -s /opt/zig/zig /usr/local/bin/zig
          zig version

      - name: build (glibc/macos)
        if: ${{ !matrix.alpine }}
        run: zig build -Doptimize=ReleaseFast
        env:
          PKG_CONFIG_PATH: ${{ runner.os == 'macOS' && '/opt/homebrew/opt/mysql-client/lib/pkgconfig:/opt/homebrew/opt/libpq/lib/pkgconfig:/opt/homebrew/opt/curl/lib/pkgconfig:/usr/local/opt/mysql-client/lib/pkgconfig:/usr/local/opt/libpq/lib/pkgconfig' || '' }}

      - name: build (musl)
        if: matrix.alpine
        shell: alpine.sh {0}
        run: zig build -Doptimize=ReleaseFast

      - name: smoke test (musl)
        if: matrix.alpine
        shell: alpine.sh {0}
        run: |
          cat > /tmp/smoke.php <<'PHP'
          <?php
          echo "musl ok: " . PHP_VERSION . "\n";
          echo (preg_match('/^ok$/', 'ok') ? 'pcre ok' : 'pcre fail') . "\n";
          echo (fileperms('/etc/hostname') > 0 ? 'stat ok' : 'stat fail') . "\n";
          PHP
          ./zig-out/bin/zphp run /tmp/smoke.php

      - name: package
        run: |
          cp zig-out/bin/zphp zphp-${{ matrix.name }}
          chmod +x zphp-${{ matrix.name }}

      - uses: actions/upload-artifact@v4
        with:
          name: zphp-${{ matrix.name }}
          path: zphp-${{ matrix.name }}

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*

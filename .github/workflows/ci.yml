name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.0
      - name: install system libs
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get update && sudo apt-get install -y libpcre2-dev libsqlite3-dev
          fi
      - run: zig build test
      - run: zig build

  serve:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.0
      - name: install system libs
        run: sudo apt-get update && sudo apt-get install -y libpcre2-dev libsqlite3-dev
      - run: zig build
      - run: ./tests/serve_test

  test-runner:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.0
      - name: install system libs
        run: sudo apt-get update && sudo apt-get install -y libpcre2-dev libsqlite3-dev
      - run: zig build
      - run: ./tests/test_runner_test

  packages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.0
      - name: install system libs
        run: sudo apt-get update && sudo apt-get install -y libpcre2-dev libsqlite3-dev
      - run: zig build
      - run: ./tests/pkg_test

  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.0
      - name: install system libs
        run: sudo apt-get update && sudo apt-get install -y libpcre2-dev libsqlite3-dev
      - run: zig build
      - run: ./tests/fmt_test

  php-compat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.0
      - name: install system libs
        run: sudo apt-get update && sudo apt-get install -y libpcre2-dev libsqlite3-dev
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
      - run: zig build
      - run: php --version
      - run: ./tests/run
